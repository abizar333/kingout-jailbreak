<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard • KING OUT BANDING</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        dark: '#080518',
                        darker: '#03020e',
                        primary: '#ff2e63',
                        secondary: '#7b2ffd',
                        accent: '#00f0ff',
                        gold: '#ffd700',
                        premium1: '#ff2e63',
                        premium2: '#7b2ffd',
                        premium3: '#00f0ff',
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'Segoe UI', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .bg-gradient-main {
                background: linear-gradient(135deg, #03020e 0%, #1a0b3d 25%, #2d0b59 50%, #1a0b3d 75%, #03020e 100%);
                background-size: 400% 400%;
                animation: moveGradient 20s ease infinite;
            }
            .glass {
                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(12px);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            .glass-hover {
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 46, 99, 0.3);
            }
            .text-gradient {
                background: linear-gradient(90deg, #ff2e63, #7b2ffd, #00f0ff);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                filter: drop-shadow(0 0 12px rgba(255, 46, 99, 0.5));
            }
            .btn-gradient-1 {
                background: linear-gradient(90deg, #ff2e63, #ff5783);
                transition: all 0.3s ease;
            }
            .btn-gradient-1:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(255, 46, 99, 0.5);
            }
            .btn-gradient-2 {
                background: linear-gradient(90deg, #7b2ffd, #985aff);
                transition: all 0.3s ease;
            }
            .btn-gradient-2:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(123, 47, 253, 0.5);
            }
            .btn-gradient-3 {
                background: linear-gradient(90deg, #00f0ff, #5affff);
                transition: all 0.3s ease;
            }
            .btn-gradient-3:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 20px rgba(0, 240, 255, 0.5);
            }
            .border-glow {
                box-shadow: 0 0 20px rgba(255, 46, 99, 0.3), 
                            0 0 40px rgba(123, 47, 253, 0.2), 
                            inset 0 0 1px rgba(255, 255, 255, 0.2);
            }
            .modal-glow {
                box-shadow: 0 0 30px rgba(255, 46, 99, 0.4), 
                            0 0 60px rgba(123, 47, 253, 0.25), 
                            inset 0 0 2px rgba(255, 255, 255, 0.15);
            }
            .input-glow:focus {
                box-shadow: 0 0 15px rgba(255, 46, 99, 0.4), 
                            0 0 30px rgba(123, 47, 253, 0.25), 
                            inset 0 0 2px rgba(255, 255, 255, 0.15);
                border-color: #ff2e63;
            }
            .scrollbar-custom::-webkit-scrollbar { width: 6px; }
            .scrollbar-custom::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
            .scrollbar-custom::-webkit-scrollbar-thumb { background: linear-gradient(180deg, #ff2e63, #7b2ffd); border-radius: 10px; }
            .scrollbar-custom::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, #ff5783, #985aff); }
            @keyframes moveGradient {
                0% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }
        }
    </style>
</head>
<body class="bg-gradient-main min-h-screen p-5">
    <div class="max-w-md mx-auto">
        <!-- Info Akun -->
        <div class="glass rounded-2xl p-5 mb-6 border border-white/15 border-glow">
            <div class="flex justify-between items-center">
                <div>
                    <span id="labelPeran" class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider bg-gradient-to-r from-primary to-secondary text-white shadow-lg"></span>
                    <h2 class="text-2xl font-bold text-white mt-2">Selamat Datang, <span id="namaPengguna" class="text-gradient font-black"></span> 👑</h2>
                </div>
                <div id="waktuSekarang" class="glass px-4 py-2 rounded-xl text-accent font-mono text-lg border border-white/20"></div>
            </div>
        </div>

        <!-- Panel Pemilik -->
        <div id="panelPemilik" class="glass rounded-2xl p-5 mb-6 border border-white/15 border-glow hidden">
            <h3 class="text-xl font-bold text-gradient mb-5 flex items-center"><i class="fa fa-crown mr-2"></i>PANEL PEMILIK</h3>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="bukaModalTambah()" 
                        class="btn-gradient-1 text-white py-3.5 rounded-xl font-semibold shadow-lg">
                    <i class="fa fa-plus-circle mr-2"></i>Tambah Konten
                </button>
                <button onclick="bukaModalBuatSemua()" 
                        class="btn-gradient-2 text-white py-3.5 rounded-xl font-semibold shadow-lg">
                    <i class="fa fa-user-plus mr-2"></i>Buat Akun
                </button>
                <button onclick="tampilDaftarAkun()" 
                        class="glass glass-hover text-white py-3.5 rounded-xl font-semibold border border-white/20 hover:border-primary/50 transition-all duration-300">
                    <i class="fa fa-list mr-2"></i>Daftar Akun
                </button>
            </div>
        </div>

        <!-- Panel Reseller -->
        <div id="panelReseller" class="glass rounded-2xl p-5 mb-6 border border-white/15 border-glow hidden">
            <h3 class="text-xl font-bold text-secondary mb-5 flex items-center"><i class="fa fa-briefcase mr-2"></i>PANEL RESELLER</h3>
            <button onclick="bukaModalBuatMember()" 
                    class="w-full btn-gradient-2 text-white py-3.5 rounded-xl font-semibold shadow-lg">
                <i class="fa fa-user-plus mr-2"></i>Buat Akun Member
            </button>
        </div>

        <!-- Daftar Konten -->
        <div class="glass rounded-2xl p-5 mb-6 border border-white/15 border-glow">
            <h3 class="text-xl font-bold text-gradient mb-5 flex items-center"><i class="fa fa-database mr-2"></i>KOLEKSI KONTEN</h3>
            <div id="wadahKonten" class="max-h-80 overflow-y-auto pr-1 scrollbar-custom">
                <div class="text-center text-white/50 py-16">
                    <i class="fa fa-folder-open-o text-7xl mb-5 opacity-60"></i>
                    <p class="text-lg">Belum ada konten premium ditambahkan</p>
                </div>
            </div>
        </div>

        <!-- Tombol Keluar -->
        <button onclick="keluarAkun()" 
                class="w-full glass glass-hover text-white py-4 rounded-xl font-semibold text-lg border border-white/20 hover:border-primary/50 transition-all duration-300">
            <i class="fa fa-sign-out mr-2"></i>KELUAR DARI SISTEM
        </button>
    </div>

    <!-- Modal Tambah Konten -->
    <div id="modalTambah" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 hidden">
        <div class="glass rounded-2xl p-6 w-full max-w-md border border-primary/30 modal-glow">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-gradient"><i class="fa fa-plus-circle mr-2"></i>Tambah Konten Baru</h3>
                <button onclick="tutupModalTambah()" class="w-10 h-10 flex items-center justify-center rounded-full bg-primary/20 hover:bg-primary text-white text-xl font-bold transition-all duration-200 border border-primary/40 hover:border-primary">
                    &times;
                </button>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-white/80 mb-2 text-sm font-medium">Nama Konten</label>
                    <input type="text" id="namaKonten" placeholder="Contoh: Konten Premium Terbaru" 
                           class="w-full px-4 py-3 rounded-xl glass border border-white/20 text-white outline-none transition-all duration-300 input-glow">
                </div>
                <div>
                    <label class="block text-white/80 mb-2 text-sm font-medium">Isi Konten</label>
                    <textarea id="isiKonten" rows="6" placeholder="Masukkan teks, kode, atau link..." 
                              class="w-full px-4 py-3 rounded-xl glass border border-white/20 text-white outline-none transition-all duration-300 input-glow resize-none"></textarea>
                </div>
                <button onclick="simpanKonten()" 
                        class="w-full btn-gradient-1 text-white py-3 rounded-xl font-semibold shadow-lg">
                    <i class="fa fa-save mr-2"></i>SIMPAN KONTEN
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Buat Akun -->
    <div id="modalBuatSemua" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 hidden">
        <div class="glass rounded-2xl p-6 w-full max-w-md border border-secondary/30 modal-glow">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-gradient"><i class="fa fa-user-plus mr-2"></i>Buat Akun Baru</h3>
                <button onclick="tutupModalBuatSemua()" class="w-10 h-10 flex items-center justify-center rounded-full bg-secondary/20 hover:bg-secondary text-white text-xl font-bold transition-all duration-200 border border-secondary/40 hover:border-secondary">
                    &times;
                </button>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-white/80 mb-2 text-sm font-medium">Username</label>
                    <input type="text" id="userBaruSemua" placeholder="Username baru" 
                           class="w-full px-4 py-3 rounded-xl glass border border-white/20 text-white outline-none transition-all duration-300 input-glow">
                </div>
                <div>
                    <label class="block text-white/80 mb-2 text-sm font-medium">Password</label>
                    <input type="password" id="passBaruSemua" placeholder="Password baru" 
                           class="w-full px-4 py-3 rounded-xl glass border border-white/20 text-white outline-none transition-all duration-300 input-glow">
                </div>
                <div>
                    <label class="block text-white/80 mb-2 text-sm font-medium">Hak Akses</label>
                    <select id="peranBaruSemua" 
                            class="w-full px-4 py-3 rounded-xl glass border border-white/20 text-white outline-none transition-all duration-300 input-glow">
                        <option value="member">Member Premium</option>
                        <option value="reseller">Reseller Premium</option>
                        <option value="pemilik">Pemilik Premium</option>
                    </select>
                </div>
                <div>
                    <label class="block text-white/80 mb-2 text-sm font-medium">Durasi Aktif</label>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="nilaiWaktuSemua" min="1" value="1" 
                               class="px-4 py-3 rounded-xl glass border border-white/20 text-white outline-none transition-all duration-300 input-glow">
                        <select id="satuanWaktuSemua" 
                                class="px-4 py-3 rounded-xl glass border border-white/20 text-white outline-none transition-all duration-300 input-glow">
                            <option value="detik">Detik</option>
                            <option value="menit">Menit</option>
                            <option value="jam">Jam</option>
                            <option value="hari" selected>Hari</option>
                            <option value="minggu">Minggu</option>
                            <option value="bulan">Bulan</option>
                            <option value="tahun">Tahun</option>
                            <option value="permanen">PERMANEN</option>
                        </select>
                    </div>
                </div>
                <button onclick="prosesBuatSemua()" 
                        class="w-full btn-gradient-2 text-white py-3 rounded-xl font-semibold shadow-lg">
                    <i class="fa fa-check mr-2"></i>BUAT AKUN
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Buat Member -->
    <div id="modalBuatMember" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 hidden">
        <div class="glass rounded-2xl p-6 w-full max-w-md border border-accent/30 modal-glow">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-accent"><i class="fa fa-user-plus mr-2"></i>Buat Akun Member</h3>
                <button onclick="tutupModalBuatMember()" class="w-10 h-10 flex items-center justify-center rounded-full bg-accent/20 hover:bg-accent text-black text-xl font-bold transition-all duration-200 border border-accent/40 hover:border-accent">
                    &times;
                </button>
            </div>
            <div class="space-y-5">
                <div>
                    <label class="block text-white/80 mb-2 text-sm font-medium">Username</label>
                    <input type="text" id="userBaruMember" placeholder="Username baru" 
                           class="w-full px-4 py-3 rounded-xl glass border border-white/20 text-white outline-none transition-all duration-300 input-glow">
                </div>
                <div>
                    <label class="block text-white/80 mb-2 text-sm font-medium">Password</label>
                    <input type="password" id="passBaruMember" placeholder="Password baru" 
                           class="w-full px-4 py-3 rounded-xl glass border border-white/20 text-white outline-none transition-all duration-300 input-glow">
                </div>
                <div>
                    <label class="block text-white/80 mb-2 text-sm font-medium">Durasi Aktif</label>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="nilaiWaktuMember" min="1" value="1" 
                               class="px-4 py-3 rounded-xl glass border border-white/20 text-white outline-none transition-all duration-300 input-glow">
                        <select id="satuanWaktuMember" 
                                class="px-4 py-3 rounded-xl glass border border-white/20 text-white outline-none transition-all duration-300 input-glow">
                            <option value="detik">Detik</option>
                            <option value="menit">Menit</option>
                            <option value="jam">Jam</option>
                            <option value="hari" selected>Hari</option>
                            <option value="minggu">Minggu</option>
                            <option value="bulan">Bulan</option>
                            <option value="tahun">Tahun</option>
                            <option value="permanen">PERMANEN</option>
                        </select>
                    </div>
                </div>
                <button onclick="prosesBuatMember()" 
                        class="w-full btn-gradient-3 text-black py-3 rounded-xl font-semibold shadow-lg">
                    <i class="fa fa-check mr-2"></i>BUAT AKUN MEMBER
                </button>
            </div>
        </div>
    </div>

    <!-- Modal Daftar Akun -->
    <div id="modalDaftarAkun" class="fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50 p-4 hidden">
        <div class="glass rounded-2xl p-6 w-full max-w-md border border-gold/30 modal-glow">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-gold"><i class="fa fa-list mr-2"></i>Daftar Semua Akun</h3>
                <button onclick="tutupDaftarAkun()" class="w-10 h-10 flex items-center justify-center rounded-full bg-gold/20 hover:bg-gold text-black text-xl font-bold transition-all duration-200 border border-gold/40 hover:border-gold">
                    &times;
                </button>
            </div>
            <div id="isiDaftarAkun" class="max-h-72 overflow-y-auto pr-1 space-y-3 scrollbar-custom"></div>
        </div>
    </div>

    <script>
        let sesi = localStorage.getItem("sesiAktif");
        let dataPengguna = localStorage.getItem("dataPengguna");

        if (!sesi || !dataPengguna) {
            window.location.replace("index.html");
        } else {
            sesi = JSON.parse(sesi);
            dataPengguna = JSON.parse(dataPengguna);
            
            if (!dataPengguna.hasOwnProperty(sesi.nama)) {
                localStorage.removeItem("sesiAktif");
                window.location.replace("index.html");
            }
        }

        let dataKonten = JSON.parse(localStorage.getItem("dataKonten") || "[]");
        let indeksEdit = -1;

        document.getElementById("namaPengguna").textContent = sesi.nama;
        const labelPeran = document.getElementById("labelPeran");
        labelPeran.textContent = sesi.peran.toUpperCase();
        
        if (sesi.peran === "pemilik") {
            labelPeran.className = "px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider bg-gradient-to-r from-primary to-secondary text-white shadow-lg";
            document.getElementById("panelPemilik").style.display = "block";
        } else if (sesi.peran === "reseller") {
            labelPeran.className = "px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider bg-gradient-to-r from-secondary to-accent text-white shadow-lg";
            document.getElementById("panelReseller").style.display = "block";
        } else {
            labelPeran.className = "px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider bg-gradient-to-r from-accent to-primary text-white shadow-lg";
        }

        function tampilJam() {
            const w = new Date();
            const j = String(w.getHours()).padStart(2, '0');
            const m = String(w.getMinutes()).padStart(2, '0');
            const d = String(w.getSeconds()).padStart(2, '0');
            document.getElementById("waktuSekarang").textContent = `${j}:${m}:${d}`;
        }
        tampilJam();
        setInterval(tampilJam, 1000);

        function simpanSemua() {
            localStorage.setItem("dataPengguna", JSON.stringify(dataPengguna));
            localStorage.setItem("dataKonten", JSON.stringify(dataKonten));
        }

        // Kontrol Konten
        function bukaModalTambah(idx = -1) {
            indeksEdit = idx;
            document.getElementById("modalTambah").style.display = "flex";
            if (idx >= 0) {
                document.getElementById("namaKonten").value = dataKonten[idx].nama;
                document.getElementById("isiKonten").value = dataKonten[idx].isi;
            } else {
                document.getElementById("namaKonten").value = "";
                document.getElementById("isiKonten").value = "";
            }
        }
        function tutupModalTambah() { document.getElementById("modalTambah").style.display = "none"; indeksEdit = -1; }

        function simpanKonten() {
            const nama = document.getElementById("namaKonten").value.trim();
            const isi = document.getElementById("isiKonten").value.trim();
            if (!nama || !isi) return alert("❌ Isi Nama dan Isi Konten terlebih dahulu!");
            
            if (indeksEdit >= 0) dataKonten[indeksEdit] = { nama, isi };
            else dataKonten.push({ nama, isi });
            
            simpanSemua(); tampilKonten(); tutupModalTambah(); alert("✅ Konten berhasil disimpan!");
        }

        function tampilKonten() {
            const wadah = document.getElementById("wadahKonten");
            if (dataKonten.length === 0) {
                wadah.innerHTML = `<div class="text-center text-white/50 py-16"><i class="fa fa-folder-open-o text-7xl mb-5 opacity-60"></i><p class="text-lg">Belum ada konten premium ditambahkan</p></div>`;
                return;
            }
            
            wadah.innerHTML = "";
            dataKonten.forEach((item, i) => {
                wadah.innerHTML += `
                <div class="glass rounded-xl border border-white/15 p-4 mb-4 border-glow">
                    <h4 class="text-gradient font-bold mb-3 text-lg">📌 ${item.nama}</h4>
                    <pre class="bg-black/40 rounded-lg p-3 text-white/90 text-sm whitespace-pre-wrap break-all border border-white/10">${item.isi}</pre>
                    <div class="mt-4 grid grid-cols-${sesi.peran === 'pemilik' ? '3' : '1'} gap-2">
                        <button onclick="salinTeks(\`${item.isi.replace(/`/g, '\\`')}\`)" class="btn-gradient-3 text-black py-2 rounded-lg text-sm font-medium shadow-md"><i class="fa fa-copy mr-1"></i>Salin</button>
                        ${sesi.peran === 'pemilik' ? `<button onclick="bukaModalTambah(${i})" class="glass glass-hover text-white py-2 rounded-lg text-sm font-medium border border-white/20"><i class="fa fa-pencil mr-1"></i>Edit</button>
                        <button onclick="hapusKonten(${i})" class="btn-gradient-1 text-white py-2 rounded-lg text-sm font-medium shadow-md"><i class="fa fa-trash mr-1"></i>Hapus</button>` : ''}
                    </div>
                </div>`;
            });
        }

        function salinTeks(teks) { navigator.clipboard.writeText(teks).then(() => alert("✅ Berhasil disalin!")).catch(() => alert("❌ Gagal menyalin!")); }
        function hapusKonten(i) { if (confirm("⚠️ Yakin menghapus konten ini?")) { dataKonten.splice(i, 1); simpanSemua(); tampilKonten(); } }

        // Kontrol Akun
        function hitungMilis(n, s) {
            const satuan = { detik: 1000, menit: 60000, jam: 3600000, hari: 86400000, minggu: 604800000, bulan: 2592000000, tahun: 31536000000 };
            return satuan[s] ? n * satuan[s] : null;
        }

        function bukaModalBuatSemua() { document.getElementById("modalBuatSemua").style.display = "flex"; }
        function tutupModalBuatSemua() { document.getElementById("modalBuatSemua").style.display = "none"; }
        function prosesBuatSemua() {
            const u = document.getElementById("userBaruSemua").value.trim();
            const p = document.getElementById("passBaruSemua").value.trim();
            const r = document.getElementById("peranBaruSemua").value;
            const n = parseInt(document.getElementById("nilaiWaktuSemua").value);
            const s = document.getElementById("satuanWaktuSemua").value;
            
            if (!u || !p) return alert("❌ Lengkapi Username dan Password!");
            if (dataPengguna.hasOwnProperty(u)) return alert("❌ Username sudah terdaftar!");
            
            const kadaluarsa = s === "permanen" ? "permanen" : Date.now() + hitungMilis(n, s);
            dataPengguna[u] = { sandi: p, peran: r, kadaluarsa: kadaluarsa };
            simpanSemua(); tutupModalBuatSemua(); alert(`✅ Akun ${u} berhasil dibuat!`);
        }

        function bukaModalBuatMember() { document.getElementById("modalBuatMember").style.display = "flex"; }
        function tutupModalBuatMember() { document.getElementById("modalBuatMember").style.display = "none"; }
        function prosesBuatMember() {
            const u = document.getElementById("userBaruMember").value.trim();
            const p = document.getElementById("passBaruMember").value.trim();
            const n = parseInt(document.getElementById("nilaiWaktuMember").value);
            const s = document.getElementById("satuanWaktuMember").value;
            
            if (!u || !p) return alert("❌ Lengkapi Username dan Password!");
            if (dataPengguna.hasOwnProperty(u)) return alert("❌ Username sudah terdaftar!");
            
            const kadaluarsa = s === "permanen" ? "permanen" : Date.now() + hitungMilis(n, s);
            dataPengguna[u] = { sandi: p, peran: "member", kadaluarsa: kadaluarsa };
            simpanSemua(); tutupModalBuatMember(); alert(`✅ Akun Member ${u} berhasil dibuat!`);
        }

        function tampilDaftarAkun() {
            const wadah = document.getElementById("isiDaftarAkun");
            wadah.innerHTML = "";
            for (let username in dataPengguna) {
                const akun = dataPengguna[username];
                const aktif = akun.kadaluarsa === "permanen" || Date.now() < akun.kadaluarsa;
                const waktuTampil = akun.kadaluarsa === "permanen" ? "PERMANEN" : new Date(akun.kadaluarsa).toLocaleString('id-ID');
                
                wadah.innerHTML += `
                <div class="glass rounded-lg p-4 border border-white/15 border-l-4 ${aktif ? 'border-accent' : 'border-primary'}">
                    <p class="text-white text-sm"><strong>👤 Username:</strong> ${username}</p>
                    <p class="text-white text-sm"><strong>🔑 Password:</strong> ${akun.sandi}</p>
                    <p class="text-white text-sm"><strong>⚡ Hak Akses:</strong> ${akun.peran.toUpperCase()}</p>
                    <p class="text-white text-sm"><strong>⏳ Kadaluarsa:</strong> ${waktuTampil}</p>
                    <p class="text-${aktif ? 'accent' : 'primary'} text-sm mt-1 font-semibold">${aktif ? '✅ AKTIF' : '❌ KADALUARSA'}</p>
                </div>`;
            }
            document.getElementById("modalDaftarAkun").style.display = "flex";
        }
        function tutupDaftarAkun() { document.getElementById("modalDaftarAkun").style.display = "none"; }

        function keluarAkun() { localStorage.removeItem("sesiAktif"); window.location.replace("index.html"); }

        tampilKonten();
    </script>
</body>
</html>
